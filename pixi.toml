[workspace]
name = "fmask"
version = "5.0.1"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]
preview = ["pixi-build"]
conda-pypi-map = { "conda-forge" = "conda-pypi-map.json" }

[dependencies]
python = ">=3.10"
gdal = "*"
libgdal-jp2openjpeg = "*"
rasterio = "*"
numpy = ">=1.22"
scipy = "*"
pandas = "*"
# binary_dilation will be removed in 0.28
scikit-image = ">=0.25,<0.28"
# Pin for compatibility with pre-saved model pickles
scikit-learn = "==1.1.2"
pytorch = "*"
matplotlib = "*"
plotly = "*"
nbformat = "*"
pyproj = "*"
click = "*"
lxml = "*"
geopandas = "*"
lightgbm = "*"
utm = "*"
segmentation-models-pytorch = "*"

[pypi-dependencies]
fmask = { path = ".", editable = true }

[package]
name = "fmask"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "*" }
