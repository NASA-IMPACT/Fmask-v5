[workspace]
name = "fmask"
version = "5.0.2"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]
preview = ["pixi-build"]
conda-pypi-map = { conda-forge = "conda-pypi-map.json" }

[dependencies]
python = ">=3.10,<3.13"
gdal = "*"
libgdal-jp2openjpeg = "*"
rasterio = "*"
numpy = "*"
scipy = "*"
pandas = "*"
scikit-image = "*"
scikit-learn = "*"
pytorch = "*"
matplotlib = "*"
plotly = "*"
nbformat = "*"
pyproj = "*"
click = "*"
lxml = "*"
geopandas = "*"
lightgbm = "*"
utm = "*"
segmentation-models-pytorch = "*"

[pypi-dependencies]
fmask = { path = ".", editable = true }

[package]
name = "fmask"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "*" }
